# Domya player sync API endpoint.
api-url: "https://example.com/api/minecraft/player_update.php"

# Domya account link endpoint.
link-url: "https://example.com/api/minecraft/link.php"

# Shared secret token. Keep the real value only on the server.
secret-token: "CHANGE_ME"

# Automatically sync online players every N seconds.
sync-interval-seconds: 300

# Sync a player when they join or quit.
sync-on-join: true
sync-on-quit: true

# Log request/response details useful for troubleshooting.
debug: false

# Locale used for console and non-player command output.
default-locale: "ru"

# Name sent to the website in nickname/display_name fields.
# If PlaceholderAPI or the placeholder value is unavailable, the plugin falls back to the real Minecraft name.
display-name:
  use-placeholderapi: true
  placeholder: "%ethoschat_display_name%"

# When false, the JSON contract stays the same, but private fields are replaced with fake values.
# Safe aggregate statistics are still sent.
privacy:
  send-private-data: true
  fake-world: ""
  fake-coordinate: 0.0
  fake-health: 20.0
  fake-food: 20
  fake-level: 0
  fake-exp: 0.0
